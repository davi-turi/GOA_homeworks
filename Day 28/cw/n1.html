<!-- CSS აქვს 3 გამოყენების ტექნიკა:inline css, internal css, external css. Inline css იწერება html ფაილში კონკრეტულ ელემენტზე style ატრიბუტის გამოყენებით.Internal css იწერება head თეგში მოთავსებულ style კონტეინერ თეგში, მის გამოსაყენებლად გვჭირდება css rule, selector და declaration. External css იწერება ცალკე css ფაილში, რომელიც html ფაილს უკავშირდება <link rel="stylesheet href="./style.css">-ით. მის გამოსაყენებლადაც გვჭირდება css rule,selector,declaration. თუ გვინდა ყველა ელემენტი განსხვავებულად გაისტილოს, უნდა გამოვიყენოთ id და ამ სახელების მიხედვით უნდა გამოვიძახოთ.-->
